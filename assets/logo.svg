<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Shushu Internship Tool Logo">
  <defs>
    <linearGradient id="mouseBodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>

    <linearGradient id="earGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a9e"/>
      <stop offset="100%" stop-color="#fecfef"/>
    </linearGradient>

    <linearGradient id="toolGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="500" height="500" rx="28" fill="#ffffff"/>
  <circle cx="250" cy="230" r="180" fill="#e0f7fa" opacity="0.5"/>

  <g filter="url(#dropShadow)">
    <path d="M150 350 Q150 200 250 200 Q350 200 350 350 Z" fill="url(#mouseBodyGradient)"/>

    <circle cx="250" cy="220" r="70" fill="url(#mouseBodyGradient)"/>

    <circle cx="180" cy="160" r="40" fill="url(#mouseBodyGradient)"/>
    <circle cx="180" cy="160" r="25" fill="url(#earGradient)"/>

    <circle cx="320" cy="160" r="40" fill="url(#mouseBodyGradient)"/>
    <circle cx="320" cy="160" r="25" fill="url(#earGradient)"/>

    <circle cx="225" cy="210" r="22" fill="none" stroke="#2c3e50" stroke-width="6"/>
    <circle cx="275" cy="210" r="22" fill="none" stroke="#2c3e50" stroke-width="6"/>
    <line x1="247" y1="210" x2="253" y2="210" stroke="#2c3e50" stroke-width="6"/>

    <circle cx="225" cy="210" r="6" fill="#2c3e50"/>
    <circle cx="275" cy="210" r="6" fill="#2c3e50"/>

    <polygon points="245,235 255,235 250,245" fill="#ff7675"/>

    <line x1="180" y1="230" x2="210" y2="235" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
    <line x1="175" y1="245" x2="205" y2="245" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
    <line x1="290" y1="235" x2="320" y2="230" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
    <line x1="295" y1="245" x2="325" y2="245" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(130, 250) rotate(-45)">
    <path d="M30 10 Q50 -10 70 10 L60 20 L70 30 Q50 50 30 30 Z" fill="#b2bec3"/>
    <rect x="42" y="25" width="16" height="70" fill="#b2bec3" rx="5"/>
    <circle cx="50" cy="95" r="8" fill="#b2bec3"/>
  </g>

  <g transform="translate(300, 260)">
    <path d="M40 10 L45 20 A25 25 0 0 1 55 25 L65 20 L70 30 L60 35 A25 25 0 0 1 60 45 L70 50 L65 60 L55 55 A25 25 0 0 1 45 60 L40 70 L30 70 L35 60 A25 25 0 0 1 25 55 L15 60 L10 50 L20 45 A25 25 0 0 1 20 35 L10 30 L15 20 L25 25 A25 25 0 0 1 35 20 L30 10 Z" fill="url(#toolGradient)"/>
    <circle cx="40" cy="40" r="12" fill="#ffffff"/>
  </g>

  <text x="250" y="420" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="bold" font-size="42" fill="#2c3e50" text-anchor="middle" letter-spacing="2">SIT</text>
  <text x="250" y="455" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="20" fill="#7f8c8d" text-anchor="middle" letter-spacing="1">SHUSHU INTERNSHIP TOOL</text>
</svg>

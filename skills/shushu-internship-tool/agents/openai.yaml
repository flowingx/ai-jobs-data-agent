interface:
  display_name: "鼠鼠实习妙妙工具"
  short_description: "鼠鼠实习就业交流群联动版项目求职工具"
  default_prompt: "使用鼠鼠实习妙妙工具，根据我的目标 JD 快速规划一个能投递、能面试、能讲清的计算机实习项目。收到 JD 后，请先完成 JD 初步理解，然后必须询问我是否有项目偏好 / taste：1. 有，展示 A/B/C/D，其中 A/B/C 根据 JD 项目大概分类动态生成；如果我提供了个人信息、技术栈、时间预算或资源条件，也一起考虑；D 是我自己填写的输入框。2. 没有，按 JD 和默认稳妥策略走原 workflow，不加 taste 权重。如果我初始消息里已经写了 taste，也先问我是否将它作为 D 自定义偏好；我选择否时忽略这段偏好。"

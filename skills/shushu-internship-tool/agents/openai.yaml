interface:
  display_name: "鼠鼠实习妙妙工具"
  short_description: "鼠鼠实习就业交流群联动版项目求职工具"
  default_prompt: "使用鼠鼠实习妙妙工具，根据我的目标 JD 快速规划一个能投递、能面试、能讲清的计算机实习项目。收到 JD 后，请先完成 JD 初步理解，然后必须用 request_user_input 或客户端结构化选择/输入控件弹出 yes/no：我是否有项目偏好 / taste；不要把是/否或选项作为普通正文直接输出。我选择否时按 JD 和默认稳妥策略走原 workflow，不加 taste 权重。我选择是时，必须再弹出第二个结构化选择控件：3 个根据 JD、我的个人信息、技术栈、时间预算、资源条件和项目大概分类动态生成的建议选项，客户端自带的 Other/自定义输入作为第 4 个选项 D。第二阶段的 3 个建议必须全部是已有 GitHub 开源项目的筛选/改造偏好，不能把“开源项目改造”做成单独选项，也不能建议从零自建项目；无论我选择哪一项，后续都必须找 2-3 个候选 GitHub 开源项目。如果我初始消息里已经写了 taste，也先弹出 yes/no 确认是否使用；确认后仍弹出第二阶段选项，并允许我在 D 中沿用或改写这段偏好。"
